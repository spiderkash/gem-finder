<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GEM Finder</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #f4f3ef;
  --surface:  #ffffff;
  --border:   #e2e0d8;
  --border2:  #ccc9bc;
  --text:     #1c1b18;
  --muted:    #6b6960;
  --accent:   #1c1b18;
  --ct:       #1a4a7a;
  --ct-bg:    #e8f0f8;
  --nih:      #1a5c2e;
  --nih-bg:   #e6f4eb;
  --pm:       #7a2a1a;
  --pm-bg:    #f8ece8;
  --sec:      #2a4a1a;
  --sec-bg:   #eaf4e6;
  --tag-bg:   #eeede8;
  --hot:      #b84a00;
  --hot-bg:   #fff0e8;
  --warm:     #7a6200;
  --warm-bg:  #fffbe6;
  --cold:     #1a4a7a;
  --cold-bg:  #e8f0f8;
  --saved:    #5a2d82;
  --saved-bg: #f2ecfa;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); font-size: 13px; min-height: 100vh; }
.app { display: flex; height: 100vh; overflow: hidden; }

/* Sidebar */
.sidebar { width: 232px; flex-shrink: 0; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow-y: auto; }
.sidebar-logo { padding: 20px 18px 14px; font-family: 'DM Mono', monospace; font-size: 11px; font-weight: 500; letter-spacing: .08em; color: var(--muted); border-bottom: 1px solid var(--border); }
.sidebar-body { padding: 16px 14px; display: flex; flex-direction: column; gap: 18px; flex: 1; }
.filter-block { display: flex; flex-direction: column; gap: 6px; }
.filter-block label { font-size: 10px; font-weight: 500; letter-spacing: .07em; color: var(--muted); text-transform: uppercase; }
.chips { display: flex; flex-wrap: wrap; gap: 4px; }
.chip { font-size: 11px; padding: 3px 10px; border-radius: 99px; border: 1px solid var(--border2); background: var(--bg); color: var(--muted); cursor: pointer; transition: all .12s; user-select: none; }
.chip:hover { border-color: var(--accent); color: var(--accent); }
.chip.on { background: var(--accent); color: #fff; border-color: var(--accent); }
.filter-block select, .filter-block input[type=text] { font-family: 'DM Sans', sans-serif; font-size: 12px; padding: 6px 10px; border: 1px solid var(--border2); border-radius: 6px; background: var(--bg); color: var(--text); width: 100%; outline: none; cursor: pointer; }
.filter-block select:focus, .filter-block input[type=text]:focus { border-color: var(--accent); }
.run-btn { margin-top: auto; padding: 11px; font-family: 'DM Mono', monospace; font-size: 12px; font-weight: 500; letter-spacing: .04em; background: var(--accent); color: #fff; border: none; border-radius: 8px; cursor: pointer; transition: opacity .12s; width: 100%; }
.run-btn:hover { opacity: .88; }
.run-btn:disabled { opacity: .35; cursor: not-allowed; }
.reset-btn { padding: 8px; font-family: 'DM Mono', monospace; font-size: 11px; background: transparent; color: var(--muted); border: 1px solid var(--border2); border-radius: 8px; cursor: pointer; width: 100%; transition: all .12s; }
.reset-btn:hover { border-color: var(--accent); color: var(--accent); }

/* Main */
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.topbar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 24px; display: flex; align-items: center; flex-shrink: 0; }
.tab-btn { display: flex; align-items: center; gap: 7px; padding: 14px 18px; font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 400; color: var(--muted); border: none; background: none; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; transition: color .12s; white-space: nowrap; }
.tab-btn:hover { color: var(--text); }
.tab-btn.active { color: var(--text); border-bottom-color: var(--text); font-weight: 500; }
.tab-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.tab-count { font-family: 'DM Mono', monospace; font-size: 10px; background: var(--tag-bg); color: var(--muted); padding: 1px 7px; border-radius: 99px; }
.tab-btn.active .tab-count { background: var(--accent); color: #fff; }
#tab-saved .tab-count { background: var(--saved-bg); color: var(--saved); }
#tab-saved.active .tab-count { background: var(--saved); color: #fff; }
.topbar-right { margin-left: auto; font-size: 11px; color: var(--muted); padding-left: 16px; white-space: nowrap; }
.content { flex: 1; overflow-y: auto; padding: 20px 24px; }

/* States */
.empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 340px; gap: 10px; color: var(--muted); text-align: center; }
.empty-icon { font-family: 'DM Mono', monospace; font-size: 28px; opacity: .25; margin-bottom: 4px; }
.empty-sub { font-size: 11px; opacity: .7; }
.loading { display: flex; align-items: center; justify-content: center; min-height: 340px; gap: 8px; color: var(--muted); font-size: 12px; }
.dot { width: 5px; height: 5px; border-radius: 50%; background: currentColor; animation: pulse 1.3s ease-in-out infinite; }
.dot:nth-child(2) { animation-delay: .2s; }
.dot:nth-child(3) { animation-delay: .4s; }
@keyframes pulse { 0%,80%,100%{opacity:.15} 40%{opacity:.9} }

/* Cards */
.cards-grid { display: flex; flex-direction: column; gap: 10px; }
.ct-card, .nih-card, .pm-card, .sec-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 16px 18px; transition: border-color .12s; animation: fadeUp .2s ease both; }
.ct-card:hover, .nih-card:hover, .pm-card:hover, .sec-card:hover { border-color: var(--border2); }
.ct-card.is-saved, .nih-card.is-saved, .pm-card.is-saved, .sec-card.is-saved { border-color: var(--saved); }
@keyframes fadeUp { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:none; } }
.src-badge { display: inline-flex; align-items: center; font-family: 'DM Mono', monospace; font-size: 10px; font-weight: 500; padding: 2px 9px; border-radius: 99px; margin-bottom: 10px; }
.src-ct  { background: var(--ct-bg);  color: var(--ct); }
.src-nih { background: var(--nih-bg); color: var(--nih); }
.src-pm  { background: var(--pm-bg);  color: var(--pm); }
.src-sec { background: var(--sec-bg); color: var(--sec); }
.card-title { font-size: 14px; font-weight: 500; line-height: 1.4; margin-bottom: 8px; }
.meta-row { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 10px; }
.meta-tag { font-size: 11px; padding: 2px 9px; border-radius: 99px; background: var(--tag-bg); color: var(--muted); }
.meta-tag.phase { background: #f0ebe0; color: #5c4a1a; }
.meta-tag.status-recruiting { background: #e6f4eb; color: var(--nih); }
.meta-tag.status-active { background: #e8f0f8; color: var(--ct); }
.card-abstract { font-size: 12px; line-height: 1.7; color: var(--muted); margin-bottom: 12px; border-left: 2px solid var(--border); padding-left: 12px; }
.card-footer { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; padding-top: 12px; border-top: 1px solid var(--border); }
.footer-meta { display: flex; gap: 12px; flex-wrap: wrap; }
.footer-item { display: flex; flex-direction: column; gap: 1px; }
.footer-label { font-size: 9px; text-transform: uppercase; letter-spacing: .06em; color: var(--muted); opacity: .7; }
.footer-val { font-size: 12px; font-weight: 500; }
.card-link { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); text-decoration: none; padding: 5px 12px; border: 1px solid var(--border2); border-radius: 6px; transition: all .12s; white-space: nowrap; }
.card-link:hover { border-color: var(--accent); color: var(--accent); }
.contact-block { background: var(--bg); border-radius: 6px; padding: 8px 12px; margin-bottom: 12px; font-size: 12px; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
.contact-name { font-weight: 500; }
.contact-email { color: var(--ct); font-family: 'DM Mono', monospace; font-size: 11px; }
.funding-highlight { font-family: 'DM Mono', monospace; font-size: 16px; font-weight: 500; color: var(--nih); margin-bottom: 4px; }
.authors { font-size: 12px; color: var(--muted); margin-bottom: 4px; font-style: italic; }
.journal { font-size: 11px; color: var(--pm); font-family: 'DM Mono', monospace; }
.affil { font-size: 11px; color: var(--muted); margin-top: 4px; }
.no-results { text-align: center; padding: 40px 20px; color: var(--muted); font-size: 13px; }
.no-results span { display: block; font-size: 11px; margin-top: 4px; opacity: .7; }
.error-banner { background: #fdf0ed; border: 1px solid #f0c4b8; border-radius: 8px; padding: 14px 18px; color: #8a2a1a; font-size: 12px; margin-bottom: 16px; }

/* Controls bar */
.controls-bar { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
.filter-input { flex: 1; font-family: 'DM Sans', sans-serif; font-size: 12px; padding: 7px 12px; border: 1px solid var(--border2); border-radius: 6px; background: var(--surface); color: var(--text); outline: none; }
.filter-input:focus { border-color: var(--accent); }
.sort-select { font-family: 'DM Mono', monospace; font-size: 11px; padding: 7px 10px; border: 1px solid var(--border2); border-radius: 6px; background: var(--surface); color: var(--muted); outline: none; cursor: pointer; }
.sort-select:focus { border-color: var(--accent); }
.results-count { font-size: 11px; color: var(--muted); white-space: nowrap; font-family: 'DM Mono', monospace; }

/* Save button */
.save-btn { font-family: 'DM Mono', monospace; font-size: 11px; padding: 5px 12px; border-radius: 6px; border: 1px solid var(--border2); background: var(--bg); color: var(--muted); cursor: pointer; transition: all .12s; white-space: nowrap; }
.save-btn:hover { border-color: var(--saved); color: var(--saved); }
.save-btn.saved { background: var(--saved-bg); border-color: var(--saved); color: var(--saved); font-weight: 500; }

/* Saved tab */
.saved-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; flex-wrap: wrap; gap: 12px; }
.saved-header-left { display: flex; flex-direction: column; gap: 4px; }
.saved-header-title { font-size: 15px; font-weight: 500; }
.saved-header-sub { font-size: 11px; color: var(--muted); }
.saved-header-actions { display: flex; gap: 8px; align-items: center; }
.score-btn { font-family: 'DM Mono', monospace; font-size: 12px; font-weight: 500; padding: 9px 18px; background: var(--saved); color: #fff; border: none; border-radius: 8px; cursor: pointer; transition: opacity .12s; }
.score-btn:hover { opacity: .88; }
.score-btn:disabled { opacity: .35; cursor: not-allowed; }
.action-btn { font-family: 'DM Mono', monospace; font-size: 11px; padding: 8px 14px; background: transparent; color: var(--muted); border: 1px solid var(--border2); border-radius: 8px; cursor: pointer; transition: all .12s; }
.action-btn:hover { border-color: var(--accent); color: var(--accent); }
.action-btn.danger:hover { border-color: #b84a00; color: #b84a00; }
.saved-lead-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; display: flex; align-items: flex-start; gap: 12px; animation: fadeUp .15s ease both; }
.saved-lead-card:hover { border-color: var(--border2); }
.saved-lead-info { flex: 1; min-width: 0; }
.saved-lead-title { font-size: 13px; font-weight: 500; line-height: 1.4; margin-bottom: 5px; }
.saved-lead-meta { font-size: 11px; color: var(--muted); }
.unsave-btn { font-family: 'DM Mono', monospace; font-size: 11px; padding: 4px 10px; border: 1px solid var(--border2); border-radius: 6px; background: transparent; color: var(--muted); cursor: pointer; white-space: nowrap; flex-shrink: 0; transition: all .12s; }
.unsave-btn:hover { border-color: #b84a00; color: #b84a00; }

/* AI scoring */
.scoring-section { margin-top: 28px; }
.scoring-title { font-size: 11px; font-weight: 500; letter-spacing: .07em; text-transform: uppercase; color: var(--muted); margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
.ai-badge { background: var(--saved-bg); color: var(--saved); font-family: 'DM Mono', monospace; font-size: 9px; padding: 2px 8px; border-radius: 99px; font-weight: 500; letter-spacing: .05em; }
.summary-block { background: var(--saved-bg); border: 1px solid #d4c0ee; border-radius: 10px; padding: 14px 18px; font-size: 13px; line-height: 1.7; color: #3a1a5c; margin-bottom: 20px; }
.score-table-wrap { overflow-x: auto; }
.score-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.score-table th { font-size: 9px; font-weight: 500; letter-spacing: .07em; text-transform: uppercase; color: var(--muted); padding: 8px 12px; text-align: left; border-bottom: 2px solid var(--border); white-space: nowrap; background: var(--bg); }
.score-table td { padding: 14px 12px; border-bottom: 1px solid var(--border); vertical-align: top; line-height: 1.5; }
.score-table tr:last-child td { border-bottom: none; }
.score-table tr:hover td { background: #fafaf8; }
.score-bar-wrap { display: flex; align-items: center; gap: 8px; min-width: 120px; }
.score-bar-bg { flex: 1; height: 6px; background: var(--border); border-radius: 99px; overflow: hidden; }
.score-bar-fill { height: 100%; border-radius: 99px; }
.score-num { font-family: 'DM Mono', monospace; font-size: 14px; font-weight: 500; min-width: 28px; text-align: right; }
.tier-badge { font-family: 'DM Mono', monospace; font-size: 10px; font-weight: 500; padding: 3px 10px; border-radius: 99px; white-space: nowrap; }
.tier-hot  { background: var(--hot-bg);  color: var(--hot); }
.tier-warm { background: var(--warm-bg); color: var(--warm); }
.tier-cold { background: var(--cold-bg); color: var(--cold); }
.col-lead { max-width: 240px; }
.col-lead-title { font-weight: 500; font-size: 12px; line-height: 1.4; margin-bottom: 3px; }
.col-lead-src { font-size: 10px; color: var(--muted); font-family: 'DM Mono', monospace; }
.col-text { font-size: 12px; color: var(--muted); max-width: 200px; line-height: 1.5; }
.col-action { font-size: 12px; font-weight: 500; max-width: 200px; line-height: 1.5; }
.rank-num { font-family: 'DM Mono', monospace; font-size: 18px; font-weight: 500; color: var(--border2); width: 28px; text-align: center; }
.rank-1 { color: var(--hot); }
.rank-2 { color: var(--warm); }
.rank-3 { color: var(--text); }
.score-loading { display: flex; flex-direction: column; align-items: center; padding: 48px 20px; gap: 16px; color: var(--muted); }
.score-loading-text { font-size: 13px; }
.score-loading-sub { font-size: 11px; opacity: .7; }
</style>
</head>
<body>
<div class="app">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-logo">GEM Finder</div>
    <div class="sidebar-body">
      <div class="filter-block">
        <label>Clinical phase</label>
        <div class="chips" id="grp-phase">
          <div class="chip on" data-val="Preclinical">Preclinical</div>
          <div class="chip on" data-val="Phase 1">Phase 1</div>
          <div class="chip"    data-val="Phase 2">Phase 2</div>
        </div>
      </div>
      <div class="filter-block">
        <label>Modality</label>
        <div class="chips" id="grp-modality">
          <div class="chip on" data-val="CAR-T">CAR-T</div>
          <div class="chip"    data-val="NK cell">NK cell</div>
          <div class="chip"    data-val="TCR">TCR</div>
          <div class="chip"    data-val="iPSC">iPSC</div>
          <div class="chip"    data-val="dendritic cell">DC</div>
        </div>
      </div>
      <div class="filter-block">
        <label>Geography</label>
        <div class="chips" id="grp-geo">
          <div class="chip on" data-val="US">US only</div>
          <div class="chip"    data-val="Global">Global</div>
        </div>
      </div>
      <div class="filter-block">
        <label>Keyword(s)</label>
        <input type="text" id="indication" placeholder='e.g. lymphoma AND "Phase 1"'>
      </div>
      <div class="filter-block">
        <label>Results from year</label>
        <select id="from-year">
          <option value="2025">2025 onwards</option>
          <option value="2024">2024 onwards</option>
          <option value="2023" selected>2023 onwards</option>
          <option value="2022">2022 onwards</option>
          <option value="2021">2021 onwards</option>
          <option value="2020">2020 onwards</option>
        </select>
      </div>
      <div class="filter-block">
        <label>SEC filing types</label>
        <div class="chips" id="grp-edgar">
          <div class="chip on" data-val="10-K">10-K</div>
          <div class="chip on" data-val="S-1">S-1</div>
          <div class="chip on" data-val="8-K">8-K</div>
          <div class="chip"    data-val="10-Q">10-Q</div>
        </div>
      </div>
      <button class="run-btn" id="run-btn" onclick="runSearch()">Search all sources &rarr;</button>
      <button class="reset-btn" onclick="resetFilters()">Reset</button>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main">
    <div class="topbar">
      <button class="tab-btn active" id="tab-ct" onclick="showTab('ct')">
        <span class="tab-dot" style="background:var(--ct)"></span>ClinicalTrials.gov
        <span class="tab-count" id="cnt-ct">0</span>
      </button>
      <button class="tab-btn" id="tab-nih" onclick="showTab('nih')">
        <span class="tab-dot" style="background:var(--nih)"></span>NIH Reporter
        <span class="tab-count" id="cnt-nih">0</span>
      </button>
      <button class="tab-btn" id="tab-pm" onclick="showTab('pm')">
        <span class="tab-dot" style="background:var(--pm)"></span>PubMed
        <span class="tab-count" id="cnt-pm">0</span>
      </button>
      <button class="tab-btn" id="tab-sec" onclick="showTab('sec')">
        <span class="tab-dot" style="background:var(--sec)"></span>SEC / EDGAR
        <span class="tab-count" id="cnt-sec">0</span>
      </button>
      <button class="tab-btn" id="tab-saved" onclick="showTab('saved')">
        &#9733; Saved Leads
        <span class="tab-count" id="cnt-saved">0</span>
      </button>
      <span class="topbar-right" id="search-status">No search run yet</span>
    </div>
    <div class="content" id="content">
      <div class="empty-state">
        <div class="empty-icon">[ ]</div>
        <div>Set your filters and run the search</div>
        <div class="empty-sub">ClinicalTrials.gov &middot; NIH Reporter &middot; PubMed &middot; SEC/EDGAR<br>Save leads &middot; AI scoring &middot; Export CSV</div>
      </div>
    </div>
  </div>
</div>

<script>
// ── State ──
var results    = { clinicalTrials: [], nih: [], pubmed: [], edgar: [] };
var activeTab   = 'ct';
var filterText  = '';
var newsItems   = [];
var newsSources = [];
var newsFilter  = ''; // active source key, '' = all
var newsLoaded  = false;   // live search across all tabs
var sortKey    = { ct: 'startDate', nih: 'funding', pm: 'pubDate', sec: 'fileDate' };
var aiScores   = null;
var aiModel    = '';
var isScoring  = false;
var scoreError = '';

// ── LocalStorage helpers ──
function loadSaved() {
  try { return JSON.parse(localStorage.getItem('gem_saved_leads') || '[]'); } catch(e) { return []; }
}
function persistSaved(arr) { localStorage.setItem('gem_saved_leads', JSON.stringify(arr)); }
function loadScores() {
  try { return JSON.parse(localStorage.getItem('gem_ai_scores') || 'null'); } catch(e) { return null; }
}
function persistScores(s) {
  if (s) localStorage.setItem('gem_ai_scores', JSON.stringify(s));
  else localStorage.removeItem('gem_ai_scores');
}

// ── Lead identity ──
function leadId(r) {
  return (r._source || '') + '::' + (r.nctId || r.applId || r.pmid || r.company || r.title || '');
}
function isSaved(r) { var id = leadId(r); return loadSaved().some(function(l) { return l._savedId === id; }); }
function toggleSave(r) {
  var id = leadId(r), saved = loadSaved(), idx = -1;
  for (var i = 0; i < saved.length; i++) { if (saved[i]._savedId === id) { idx = i; break; } }
  if (idx >= 0) { saved.splice(idx, 1); persistSaved(saved); return false; }
  var copy = {}; for (var k in r) copy[k] = r[k]; copy._savedId = id;
  saved.push(copy); persistSaved(saved); return true;
}
function updateSavedCount() { document.getElementById('cnt-saved').textContent = loadSaved().length; }

// ── Lead registry (no JSON in HTML attributes) ──
var _reg = [];
function clearReg() { _reg = []; }
function reg(r) { var i = _reg.length; _reg.push(r); return i; }

document.addEventListener('click', function(e) {
  var btn = e.target.closest('.save-btn');
  if (!btn || btn.dataset.leadIdx === undefined) return;
  var r = _reg[parseInt(btn.dataset.leadIdx, 10)];
  if (!r) return;
  var now = toggleSave(r);
  btn.classList.toggle('saved', now);
  btn.textContent = now ? '\u2605 Saved' : '\u2606 Save lead';
  updateSavedCount();
  var card = btn.closest('.ct-card,.nih-card,.pm-card,.sec-card');
  if (card) card.classList.toggle('is-saved', now);
  aiScores = null; persistScores(null);
});

// ── Chip filters ──
document.querySelectorAll('.chip').forEach(function(c) {
  c.addEventListener('click', function() {
    if (c.parentElement.id === 'grp-geo') c.parentElement.querySelectorAll('.chip').forEach(function(x){ x.classList.remove('on'); });
    c.classList.toggle('on');
  });
});
function sel(id) { return Array.from(document.querySelectorAll('#'+id+' .chip.on')).map(function(c){return c.dataset.val;}); }
function resetFilters() {
  var def = {'grp-phase':['Preclinical','Phase 1'],'grp-modality':['CAR-T'],'grp-geo':['US'],'grp-edgar':['10-K','S-1','8-K']};
  document.querySelectorAll('.chip').forEach(function(c){ c.classList.toggle('on', (def[c.parentElement.id]||[]).indexOf(c.dataset.val)>=0); });
  document.getElementById('indication').value = '';
  document.getElementById('from-year').value  = '2023';
  results = { clinicalTrials:[], nih:[], pubmed:[], edgar:[] };
  updateCounts(); renderTab();
  document.getElementById('search-status').textContent = 'Filters reset';
}

// ── Tab switching ──
function showTab(tab) {
  activeTab = tab;
  filterText = '';
  document.querySelectorAll('.tab-btn').forEach(function(b){ b.classList.remove('active'); });
  document.getElementById('tab-'+tab).classList.add('active');
  renderTab();
}

// ── Search ──
async function runSearch() {
  var btn = document.getElementById('run-btn');
  btn.disabled = true; btn.textContent = 'Searching...';
  document.getElementById('search-status').textContent = 'Querying all sources...';
  document.getElementById('content').innerHTML = '<div class="loading"><span class="dot"></span><span class="dot"></span><span class="dot"></span><span style="margin-left:6px">Querying sources...</span></div>';
  var filters = { phases: sel('grp-phase'), modalities: sel('grp-modality'), geo: sel('grp-geo')[0]||'US', indication: document.getElementById('indication').value.trim(), fromYear: document.getElementById('from-year').value, edgarForms: sel('grp-edgar') };
  try {
    var res = await fetch('/discover', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({filters:filters}) });
    var data = await res.json();
    results = { clinicalTrials: data.clinicalTrials||[], nih: data.nih||[], pubmed: data.pubmed||[], edgar: data.edgar||[] };
    var total = results.clinicalTrials.length + results.nih.length + results.pubmed.length + results.edgar.length;
    document.getElementById('search-status').textContent = total + ' results \xb7 ' + new Date().toLocaleTimeString();
    updateCounts(); renderTab();
  } catch(err) {
    document.getElementById('content').innerHTML = '<div class="error-banner">Search failed: ' + err.message + '</div>';
    document.getElementById('search-status').textContent = 'Error';
  }
  btn.disabled = false; btn.textContent = 'Search all sources \u2192';
}

function updateCounts() {
  document.getElementById('cnt-ct').textContent  = results.clinicalTrials.length;
  document.getElementById('cnt-nih').textContent = results.nih.length;
  document.getElementById('cnt-pm').textContent  = results.pubmed.length;
  document.getElementById('cnt-sec').textContent = results.edgar.length;
  updateSavedCount();
}

// ── Render router ──
function renderTab() {
  updateSavedCount(); clearReg();
  var c = document.getElementById('content');
  if      (activeTab==='ct')    c.innerHTML = renderCT();
  else if (activeTab==='nih')   c.innerHTML = renderNIH();
  else if (activeTab==='pm')    c.innerHTML = renderPM();
  else if (activeTab==='sec')   c.innerHTML = renderSEC();
  else if (activeTab==='saved') c.innerHTML = renderSaved();
  // update inline results count
  var el = document.getElementById('results-count');
  if (el) {
    var totals = {ct: results.clinicalTrials.length, nih: results.nih.length, pm: results.pubmed.length, sec: results.edgar.length};
    var total  = totals[activeTab] || 0;
    var cards  = c.querySelectorAll('.ct-card,.nih-card,.pm-card,.sec-card').length;
    el.textContent = filterText && total ? cards + ' / ' + total : total ? total + ' results' : '';
  }
}

// ── Shared helpers ──
function noRes(src) { return '<div class="no-results">No '+src+' results found<span>Try broader filters</span></div>'; }
function statusTag(s) {
  if (!s) return '';
  var cls = s==='RECRUITING' ? 'status-recruiting' : s.indexOf('ACTIVE')>=0 ? 'status-active' : '';
  return '<span class="meta-tag '+cls+'">'+s.replace(/_/g,' ')+'</span>';
}
var SRC_LABELS = {clinicalTrials:'ClinicalTrials',nih:'NIH Reporter',pubmed:'PubMed',edgar:'SEC/EDGAR'};
function alsoIn(r) {
  if (!r._alsoIn||!r._alsoIn.length) return '';
  return '<span class="meta-tag" style="background:#f0ebe0;color:#5c4a1a;font-size:10px">Also in: '+r._alsoIn.map(function(s){return SRC_LABELS[s]||s;}).join(', ')+'</span>';
}
function saveBtn(r) {
  var saved = isSaved(r), i = reg(r);
  return '<button class="save-btn'+(saved?' saved':'')+'" data-lead-idx="'+i+'">'+(saved?'\u2605 Saved':'\u2606 Save lead')+'</button>';
}
function footerItem(label, val, mono) {
  return '<div class="footer-item"><div class="footer-label">'+label+'</div><div class="footer-val"'+(mono?' style="font-family:\'DM Mono\',monospace;font-size:11px"':'')+'>'+val+'</div></div>';
}
function cardFooter(metaItems, linkHref, linkLabel, record) {
  return '<div class="card-footer"><div class="footer-meta">'+metaItems+'</div>'
    + '<div style="display:flex;gap:8px;align-items:center">'+saveBtn(record)+'<a href="'+linkHref+'" target="_blank" class="card-link">'+linkLabel+'</a></div></div>';
}

// ── Controls bar (search + sort) ──
function controlsBar(tab, sortOptions) {
  var opts = sortOptions.map(function(o) {
    return '<option value="'+o.val+'"'+(sortKey[tab]===o.val?' selected':'')+'>'+o.label+'</option>';
  }).join('');
  return '<div class="controls-bar" data-tab="'+tab+'">'
    + '<input class="filter-input" id="filter-input" type="text" placeholder="Filter results..." value="'+filterText.replace(/"/g,'&quot;')+'" oninput="applyFilter(this.value)" />'
    + '<select class="sort-select" data-tab="'+tab+'" onchange="applySort(this.dataset.tab,this.value)"><option value="">Sort by&hellip;</option>'+opts+'</select>'
    + '<span class="results-count" id="results-count"></span>'
  + '</div>';
}
function applyFilter(val) {
  filterText = val;
  renderTab();
  // restore focus and cursor position
  var el = document.getElementById('filter-input');
  if (el) { el.focus(); el.setSelectionRange(el.value.length, el.value.length); }
}

function applySort(tab, val) {
  if (val) sortKey[tab] = val;
  renderTab();
  var el = document.getElementById('filter-input');
  if (el) el.focus();
}

// Filter a dataset by filterText against all string fields
function applySearch(data) {
  if (!filterText.trim()) return data;
  var q = filterText.toLowerCase();
  return data.filter(function(r) {
    return Object.values(r).some(function(v) {
      return typeof v === 'string' && v.toLowerCase().indexOf(q) >= 0;
    });
  });
}

// ── ClinicalTrials ──
function renderCT() {
  var sorts = [
    {val:'startDate', label:'Start date (newest)'},
    {val:'phase',     label:'Phase'},
    {val:'sponsor',   label:'Sponsor (A-Z)'},
    {val:'status',    label:'Status'},
  ];
  var data = results.clinicalTrials.slice().sort(function(a,b){
    var k = sortKey['ct'] || 'startDate';
    return (b[k]||'').localeCompare(a[k]||'');
  });
  data = applySearch(data);
  var bar = controlsBar('ct', sorts);
  if (!results.clinicalTrials.length) return noRes('ClinicalTrials.gov');
  if (!data.length) return bar + '<div class="no-results">No results match &ldquo;'+filterText+'&rdquo;<span>Try a different keyword</span></div>';
  var html = bar + '<div class="cards-grid">';
  data.forEach(function(t,i) {
    html += '<div class="ct-card'+(isSaved(t)?' is-saved':'')+'" style="animation-delay:'+(i*40)+'ms">'
      + '<div class="src-badge src-ct">ClinicalTrials.gov</div>'
      + '<div class="card-title">'+(t.title||'(No title)')+'</div>'
      + '<div class="meta-row">'+(t.phase?'<span class="meta-tag phase">'+t.phase.replace(/_/g,' ')+'</span>':'')+statusTag(t.status)+(t.conditions?'<span class="meta-tag">'+t.conditions+'</span>':'')+(t.city||t.state?'<span class="meta-tag">'+[t.city,t.state].filter(Boolean).join(', ')+'</span>':'')+alsoIn(t)+'</div>'
      + (t.interventions?'<div class="meta-row"><span class="meta-tag">&darr; '+t.interventions+'</span></div>':'')
      + (t.contact?'<div class="contact-block"><span class="contact-name">'+t.contact+'</span>'+(t.contactRole?'<span class="meta-tag" style="font-size:10px">'+t.contactRole+'</span>':'')+(t.contactEmail?'<span class="contact-email">'+t.contactEmail+'</span>':'')+'</div>':'')
      + (t.summary?'<div class="card-abstract">'+t.summary+(t.summary.length>=400?'&hellip;':'')+'</div>':'')
      + cardFooter((t.sponsor?footerItem('Sponsor',t.sponsor):'')+( t.nctId?footerItem('Trial ID',t.nctId,true):'')+( t.startDate?footerItem('Start date',t.startDate):''), t.url, 'View on CT.gov &rarr;', t)
    + '</div>';
  });
  return html + '</div>';
}

// ── NIH Reporter ──
function renderNIH() {
  var sorts = [
    {val:'funding',   label:'Funding (highest)'},
    {val:'startDate', label:'Start date (newest)'},
    {val:'org',       label:'Institution (A-Z)'},
    {val:'fiscalYear',label:'Fiscal year'},
  ];
  var data = results.nih.slice().sort(function(a,b){
    var k = sortKey['nih'] || 'funding';
    if (k === 'funding') {
      // parse dollar strings for numeric sort
      var av = parseFloat((a.funding||'0').replace(/[^0-9.]/g,'')||0);
      var bv = parseFloat((b.funding||'0').replace(/[^0-9.]/g,'')||0);
      return bv - av;
    }
    return (b[k]||'').localeCompare(a[k]||'');
  });
  data = applySearch(data);
  var bar = controlsBar('nih', sorts);
  if (!results.nih.length) return noRes('NIH Reporter');
  if (!data.length) return bar + '<div class="no-results">No results match &ldquo;'+filterText+'&rdquo;<span>Try a different keyword</span></div>';
  var html = bar + '<div class="cards-grid">';
  data.forEach(function(g,i) {
    html += '<div class="nih-card'+(isSaved(g)?' is-saved':'')+'" style="animation-delay:'+(i*40)+'ms">'
      + '<div class="src-badge src-nih">NIH Reporter</div>'
      + '<div class="card-title">'+(g.title||'(No title)')+'</div>'
      + '<div class="meta-row">'+(g.activityCode?'<span class="meta-tag phase">'+g.activityCode+'</span>':'')+(g.fiscalYear?'<span class="meta-tag">FY '+g.fiscalYear+'</span>':'')+(g.state?'<span class="meta-tag">'+[g.city,g.state].filter(Boolean).join(', ')+'</span>':'')+alsoIn(g)+'</div>'
      + (g.funding&&g.funding!=='N/A'?'<div class="funding-highlight">'+g.funding+'</div>':'')
      + (g.abstract?'<div class="card-abstract">'+g.abstract+(g.abstract.length>=400?'&hellip;':'')+'</div>':'')
      + cardFooter((g.org?footerItem('Institution',g.org):'')+(g.pis?footerItem('PI(s)',g.pis):'')+(g.startDate?footerItem('Project start',g.startDate):'')+(g.endDate?footerItem('End date',g.endDate):''), g.url, 'View on NIH Reporter &rarr;', g)
    + '</div>';
  });
  return html + '</div>';
}

// ── PubMed ──
function renderPM() {
  var sorts = [
    {val:'pubDate',  label:'Pub date (newest)'},
    {val:'journal',  label:'Journal (A-Z)'},
    {val:'authors',  label:'Author (A-Z)'},
  ];
  var data = results.pubmed.slice().sort(function(a,b){
    var k = sortKey['pm'] || 'pubDate';
    return (b[k]||'').localeCompare(a[k]||'');
  });
  data = applySearch(data);
  var bar = controlsBar('pm', sorts);
  if (!results.pubmed.length) return noRes('PubMed');
  if (!data.length) return bar + '<div class="no-results">No results match &ldquo;'+filterText+'&rdquo;<span>Try a different keyword</span></div>';
  var html = bar + '<div class="cards-grid">';
  data.forEach(function(p,i) {
    html += '<div class="pm-card'+(isSaved(p)?' is-saved':'')+'" style="animation-delay:'+(i*40)+'ms">'
      + '<div class="src-badge src-pm">PubMed</div>'
      + '<div class="card-title">'+(p.title||'(No title)')+'</div>'
      + (p.authors?'<div class="authors">'+p.authors+(p.authors.indexOf(',')>=0?' et al.':'')+'</div>':'')
      + (p.affiliation?'<div class="affil">&#127963; '+p.affiliation+'</div>':'')
      + (p.journal?'<div class="journal">'+p.journal+' &middot; '+(p.pubDate||'')+'</div>':'')
      + (p._alsoIn&&p._alsoIn.length?'<div class="meta-row" style="margin-top:6px">'+alsoIn(p)+'</div>':'')
      + cardFooter((p.pmid?footerItem('PMID',p.pmid,true):'')+(p.doi?footerItem('DOI',p.doi,true):''), p.url, 'View on PubMed &rarr;', p)
    + '</div>';
  });
  return html + '</div>';
}

// ── SEC/EDGAR ──
function renderSEC() {
  var sorts = [
    {val:'fileDate', label:'Filed (newest)'},
    {val:'company',  label:'Company (A-Z)'},
    {val:'formType', label:'Form type'},
  ];
  var data = results.edgar.slice().sort(function(a,b){
    var k = sortKey['sec'] || 'fileDate';
    return (b[k]||'').localeCompare(a[k]||'');
  });
  data = applySearch(data);
  var bar = controlsBar('sec', sorts);
  if (!results.edgar.length) return noRes('SEC / EDGAR');
  if (!data.length) return bar + '<div class="no-results">No results match &ldquo;'+filterText+'&rdquo;<span>Try a different keyword</span></div>';
  var html = bar + '<div class="cards-grid">';
  data.forEach(function(f,i) {
    html += '<div class="sec-card'+(isSaved(f)?' is-saved':'')+'" style="animation-delay:'+(i*40)+'ms">'
      + '<div class="src-badge src-sec">SEC / EDGAR</div>'
      + '<div class="card-title">'+f.company+(f.ticker?' <span style="font-size:12px;font-weight:400;color:var(--sec);font-family:\'DM Mono\',monospace">'+f.ticker+'</span>':'')+'</div>'
      + '<div class="meta-row">'+(f.formType?'<span class="meta-tag phase">'+f.formType+'</span>':'')+(f.fileDate?'<span class="meta-tag">'+f.fileDate+'</span>':'')+(f.location?'<span class="meta-tag">'+f.location+'</span>':'')+(f.incState?'<span class="meta-tag">Inc. '+f.incState+'</span>':'')+alsoIn(f)+'</div>'
      + (f.period?'<div style="font-size:12px;color:var(--muted);margin-bottom:10px">Period ending: '+f.period+'</div>':'')
      + cardFooter(footerItem('Form type',f.formType||'N/A')+footerItem('Filed',f.fileDate||'N/A'), f.filingUrl, 'View on EDGAR &rarr;', f)
    + '</div>';
  });
  return html + '</div>';
}

// ── Saved Leads tab ──
function renderSaved() {
  var saved = loadSaved();
  updateSavedCount();

  var scoreBtn = saved.length >= 2
    ? '<button class="score-btn" id="score-btn" onclick="scoreLeads()"'+(isScoring?' disabled':'')+'>&#10022; '+(isScoring?'Scoring...':'Score with AI')+'</button>'
    : '<button class="score-btn" disabled>&#10022; Score with AI</button>';

  var html = '<div class="saved-header">'
    + '<div class="saved-header-left"><div class="saved-header-title">Saved Leads <span style="font-size:12px;font-weight:400;color:var(--muted)">('+saved.length+')</span></div>'
    + '<div class="saved-header-sub">Save leads from any tab &middot; AI scoring &middot; Export to CSV</div></div>'
    + '<div class="saved-header-actions">'+scoreBtn
    + (saved.length>0?'<button class="action-btn" onclick="exportCSV()">&#8595; Export CSV</button>':'')
    + (saved.length>0?'<button class="action-btn danger" onclick="clearAllSaved()">Clear all</button>':'')
    + '</div></div>';

  if (!saved.length) {
    return html + '<div class="empty-state" style="min-height:200px"><div class="empty-icon">&#9734;</div><div>No saved leads yet</div><div class="empty-sub">Click &#9734; Save lead on any card</div></div>';
  }

  html += '<div class="cards-grid">';
  saved.forEach(function(lead, i) {
    var title = lead.title || lead.company || '(no title)';
    var meta  = [lead._source, lead.phase||lead.activityCode||lead.formType, lead.sponsor||lead.org||lead.ticker||lead.authors, lead.conditions||lead.funding||lead.pubDate].filter(Boolean).join(' \xb7 ');
    var sid   = (leadId(lead)).replace(/\\/g,'\\\\').replace(/'/g,"\\'");
    html += '<div class="saved-lead-card" style="animation-delay:'+(i*30)+'ms">'
      + '<div class="saved-lead-info"><div class="saved-lead-title">'+title+'</div><div class="saved-lead-meta">'+meta+'</div></div>'
      + '<button class="unsave-btn" onclick="unsaveLead(\''+sid+'\')">Remove</button>'
    + '</div>';
  });
  html += '</div>';

  // Scoring state
  if (isScoring) {
    html += '<div class="scoring-section"><div class="scoring-title">AI Scoring <span class="ai-badge">OPENROUTER</span></div>'
      + '<div class="score-loading"><div style="display:flex;gap:6px"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>'
      + '<div class="score-loading-text">Analysing '+saved.length+' leads for GMP manufacturing fit...</div>'
      + '<div class="score-loading-sub">This takes 5&#8211;15 seconds</div></div></div>';
  } else if (scoreError) {
    html += '<div class="scoring-section"><div class="scoring-title">AI Scoring <span class="ai-badge">ERROR</span></div>'
      + '<div class="error-banner">Scoring failed: '+scoreError+'<br>Check your terminal for details.</div></div>';
  } else if (aiScores) {
    html += renderScoreTable(saved, aiScores);
  }

  return html;
}

function unsaveLead(sid) {
  persistSaved(loadSaved().filter(function(l){ return l._savedId !== sid; }));
  aiScores = null; persistScores(null); renderTab();
}
function clearAllSaved() {
  if (!confirm('Remove all '+loadSaved().length+' saved leads?')) return;
  persistSaved([]); aiScores = null; persistScores(null); renderTab();
}

// ── AI Scoring ──
async function scoreLeads() {
  var saved = loadSaved();
  if (saved.length < 2) return;
  isScoring = true; scoreError = ''; renderTab();
  try {
    var res  = await fetch('/score-leads', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({leads:saved}) });
    var data = await res.json();
    if (data.error) throw new Error(data.error);
    aiScores = data; aiModel = data._model || 'OpenRouter';
    persistScores(data);
    isScoring = false; renderTab();
    setTimeout(function(){ var el=document.getElementById('scoring-section'); if(el) el.scrollIntoView({behavior:'smooth',block:'start'}); }, 100);
  } catch(err) {
    isScoring = false; scoreError = err.message; renderTab();
  }
}

function renderScoreTable(saved, scores) {
  if (!scores||!scores.scores) return '';
  var sorted = scores.scores.slice().sort(function(a,b){return b.score-a.score;});
  function barColor(s){ return s>=75?'var(--hot)':s>=50?'var(--warm)':'var(--cold)'; }
  function tierCls(t){ t=(t||'').toLowerCase(); return t==='hot'?'hot':t==='warm'?'warm':'cold'; }
  var label = (aiModel||'AI').toUpperCase();
  var html = '<div class="scoring-section" id="scoring-section">'
    + '<div class="scoring-title">AI Scoring <span class="ai-badge">'+label+'</span></div>'
    + (scores.summary?'<div class="summary-block">'+scores.summary+'</div>':'')
    + '<div class="score-table-wrap"><table class="score-table"><thead><tr>'
    + '<th>#</th><th>Lead</th><th>GMP Fit Score</th><th>Why strong</th><th>Manufacturing need</th><th>Risk</th><th>Next action</th>'
    + '</tr></thead><tbody>';
  sorted.forEach(function(s, rank) {
    var lead  = saved[s.leadIndex] || {};
    var color = barColor(s.score);
    var rn    = rank+1;
    html += '<tr>'
      + '<td><div class="rank-num rank-'+rn+'">'+rn+'</div></td>'
      + '<td class="col-lead"><div class="col-lead-title">'+(lead.title||lead.company||'(no title)')+'</div><div class="col-lead-src">'+(lead._source||'')+'</div></td>'
      + '<td><div class="score-bar-wrap"><div class="score-num" style="color:'+color+'">'+s.score+'</div><div class="score-bar-bg"><div class="score-bar-fill" style="width:'+s.score+'%;background:'+color+'"></div></div></div><div style="margin-top:6px"><span class="tier-badge tier-'+tierCls(s.tier)+'">'+(s.tier||'N/A')+'</span></div></td>'
      + '<td class="col-text">'+(s.headline||'')+'</td>'
      + '<td class="col-text">'+(s.gmpFit||'')+'</td>'
      + '<td class="col-text" style="color:#b84a00">'+(s.risk||'')+'</td>'
      + '<td class="col-action">'+(s.suggestedAction||'')+'</td>'
    + '</tr>';
  });
  return html + '</tbody></table></div></div>';
}

// ── CSV Export ──
function exportCSV() {
  var saved = loadSaved(), scoreMap = {};
  if (aiScores&&aiScores.scores) aiScores.scores.forEach(function(s){ scoreMap[s.leadIndex]=s; });
  function esc(v){ return '"'+String(v||'').replace(/"/g,'""')+'"'; }
  var cols = ['Source','Title','Sponsor / Org','Phase / Form','Status','Conditions','Funding','Contact','Contact Email','Location','Start Date','URL','AI Score','AI Tier','AI Headline','AI GMP Fit','AI Risk','AI Next Action'];
  var rows = saved.map(function(l,i){
    var s = scoreMap[i]||{};
    return [esc(l._source),esc(l.title||l.company),esc(l.sponsor||l.org||l.company||l.authors),esc(l.phase||l.activityCode||l.formType),esc(l.status||l.fiscalYear||l.fileDate),esc(l.conditions||(l.abstract||'').slice(0,100)||l.journal),esc(l.funding),esc(l.contact||l.pis),esc(l.contactEmail),esc([l.city,l.state,l.country||l.location].filter(Boolean).join(', ')),esc(l.startDate||l.pubDate||l.fileDate),esc(l.url||l.filingUrl),esc(s.score),esc(s.tier),esc(s.headline),esc(s.gmpFit),esc(s.risk),esc(s.suggestedAction)].join(',');
  });
  var csv  = [cols.map(function(c){return '"'+c+'"';}).join(',')].concat(rows).join('\n');
  var blob = new Blob([csv],{type:'text/csv'});
  var url  = URL.createObjectURL(blob);
  var a    = document.createElement('a');
  a.href=url; a.download='gem-leads-'+new Date().toISOString().slice(0,10)+'.csv'; a.click();
  URL.revokeObjectURL(url);
}

// ── Init ──
aiScores = loadScores();
if (aiScores) aiModel = aiScores._model || 'OpenRouter';
updateSavedCount();
</script>
